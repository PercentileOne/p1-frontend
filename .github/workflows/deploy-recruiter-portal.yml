name: Deploy recruiter.explain.global

on:
  push:
    branches:
      - main
    paths:
      - 'src/recruiter-portal/**'
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/recruiter-portal/package-lock.json

      - name: Install dependencies
        working-directory: src/recruiter-portal
        run: npm install

      - name: Build
        working-directory: src/recruiter-portal
        run: npm run build
        env:
          VITE_ELEVENLABS_API_KEY: ${{ secrets.VITE_ELEVENLABS_API_KEY }}
          VITE_ELEVENLABS_VOICE_HR: ${{ secrets.VITE_ELEVENLABS_VOICE_HR }}
          VITE_ELEVENLABS_VOICE_TECH: ${{ secrets.VITE_ELEVENLABS_VOICE_TECH }}
          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
          VITE_DID_API_KEY: ${{ secrets.VITE_DID_API_KEY }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RECRUITER }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: src/recruiter-portal/dist
          output_location: ''
          skip_app_build: true
