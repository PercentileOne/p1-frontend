<svg viewBox="0 0 780 520" xmlns="http://www.w3.org/2000/svg" role="img" style="width:100%;height:auto;font-family:-apple-system,'Segoe UI',sans-serif;background:#0d1117;">
  <title>Recruiter Portal — Cosmos DB Data Model</title>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4F8EF7" opacity="0.6"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#A78BFA" opacity="0.6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="780" height="520" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="24" y="32" fill="#e2e8f0" font-size="13" font-weight="700" letter-spacing="-0.3">Recruiter Portal — Cosmos DB Model</text>
  <text x="24" y="50" fill="#64748b" font-size="11">Single container · partition key: /companyId · type discriminator per document</text>

  <!-- ── COMPANY ── -->
  <rect x="24" y="68" width="148" height="110" rx="10" fill="#0f1a2e" stroke="#4F8EF7" stroke-width="1.5"/>
  <rect x="24" y="68" width="148" height="24" rx="10" fill="#4F8EF7" opacity="0.2"/>
  <rect x="24" y="80" width="148" height="12" fill="#4F8EF7" opacity="0.2"/>
  <text x="98" y="84" fill="#4F8EF7" font-size="10" font-weight="800" text-anchor="middle" letter-spacing="0.08em">COMPANY</text>
  <text x="36" y="105" fill="#94a3b8" font-size="10.5">id</text>
  <text x="36" y="120" fill="#94a3b8" font-size="10.5">name</text>
  <text x="36" y="135" fill="#94a3b8" font-size="10.5">plan</text>
  <text x="36" y="150" fill="#94a3b8" font-size="10.5">createdAt</text>
  <text x="36" y="165" fill="#64748b" font-size="9" font-style="italic">partition key</text>

  <!-- ── JOBSPEC ── -->
  <rect x="220" y="68" width="160" height="180" rx="10" fill="#0f1a2e" stroke="#4F8EF7" stroke-width="1.5"/>
  <rect x="220" y="68" width="160" height="24" rx="10" fill="#4F8EF7" opacity="0.2"/>
  <rect x="220" y="80" width="160" height="12" fill="#4F8EF7" opacity="0.2"/>
  <text x="300" y="84" fill="#4F8EF7" font-size="10" font-weight="800" text-anchor="middle" letter-spacing="0.08em">JOB SPEC</text>
  <text x="232" y="105" fill="#94a3b8" font-size="10.5">id</text>
  <text x="232" y="120" fill="#94a3b8" font-size="10.5">companyId  <tspan fill="#64748b" font-size="9">→ fk</tspan></text>
  <text x="232" y="135" fill="#94a3b8" font-size="10.5">title</text>
  <text x="232" y="150" fill="#94a3b8" font-size="10.5">client</text>
  <text x="232" y="165" fill="#94a3b8" font-size="10.5">salary  <tspan fill="#64748b" font-size="9">{ min, max, currency }</tspan></text>
  <text x="232" y="180" fill="#94a3b8" font-size="10.5">status  <tspan fill="#64748b" font-size="9">Active | Hold | Filled</tspan></text>
  <text x="232" y="195" fill="#94a3b8" font-size="10.5">requirements  <tspan fill="#64748b" font-size="9">string[]</tspan></text>
  <text x="232" y="210" fill="#94a3b8" font-size="10.5">skills  <tspan fill="#64748b" font-size="9">string[]</tspan></text>
  <text x="232" y="225" fill="#94a3b8" font-size="10.5">blobUrl  <tspan fill="#64748b" font-size="9">raw doc</tspan></text>
  <text x="232" y="240" fill="#94a3b8" font-size="10.5">receivedAt · deadline</text>

  <!-- ── CANDIDATE ── -->
  <rect x="24" y="230" width="148" height="130" rx="10" fill="#160f2e" stroke="#A78BFA" stroke-width="1.5"/>
  <rect x="24" y="230" width="148" height="24" rx="10" fill="#A78BFA" opacity="0.2"/>
  <rect x="24" y="242" width="148" height="12" fill="#A78BFA" opacity="0.2"/>
  <text x="98" y="246" fill="#A78BFA" font-size="10" font-weight="800" text-anchor="middle" letter-spacing="0.08em">CANDIDATE</text>
  <text x="36" y="268" fill="#94a3b8" font-size="10.5">id</text>
  <text x="36" y="283" fill="#94a3b8" font-size="10.5">companyId</text>
  <text x="36" y="298" fill="#94a3b8" font-size="10.5">name · email · phone</text>
  <text x="36" y="313" fill="#94a3b8" font-size="10.5">currentRole</text>
  <text x="36" y="328" fill="#94a3b8" font-size="10.5">linkedIn</text>
  <text x="36" y="343" fill="#94a3b8" font-size="10.5">createdAt</text>

  <!-- ── CV ── -->
  <rect x="220" y="300" width="160" height="130" rx="10" fill="#160f2e" stroke="#A78BFA" stroke-width="1.5"/>
  <rect x="220" y="300" width="160" height="24" rx="10" fill="#A78BFA" opacity="0.2"/>
  <rect x="220" y="312" width="160" height="12" fill="#A78BFA" opacity="0.2"/>
  <text x="300" y="316" fill="#A78BFA" font-size="10" font-weight="800" text-anchor="middle" letter-spacing="0.08em">CV</text>
  <text x="232" y="337" fill="#94a3b8" font-size="10.5">id</text>
  <text x="232" y="352" fill="#94a3b8" font-size="10.5">companyId · candidateId</text>
  <text x="232" y="367" fill="#94a3b8" font-size="10.5">fileName · blobUrl</text>
  <text x="232" y="382" fill="#94a3b8" font-size="10.5">extractedData  <tspan fill="#64748b" font-size="9">{ }</tspan></text>
  <text x="232" y="397" fill="#64748b" font-size="9.5" font-style="italic">  skills[], highlights[]</text>
  <text x="232" y="415" fill="#94a3b8" font-size="10.5">uploadedAt</text>

  <!-- ── INTERVIEW PACK ── -->
  <rect x="440" y="68" width="200" height="380" rx="10" fill="#0d1a12" stroke="#34D399" stroke-width="1.5"/>
  <rect x="440" y="68" width="200" height="24" rx="10" fill="#34D399" opacity="0.2"/>
  <rect x="440" y="80" width="200" height="12" fill="#34D399" opacity="0.2"/>
  <text x="540" y="84" fill="#34D399" font-size="10" font-weight="800" text-anchor="middle" letter-spacing="0.08em">INTERVIEW PACK</text>
  <text x="452" y="105" fill="#94a3b8" font-size="10.5">id</text>
  <text x="452" y="120" fill="#94a3b8" font-size="10.5">companyId</text>
  <text x="452" y="135" fill="#94a3b8" font-size="10.5">specId  <tspan fill="#64748b" font-size="9">→ JobSpec</tspan></text>
  <text x="452" y="150" fill="#94a3b8" font-size="10.5">candidateId  <tspan fill="#64748b" font-size="9">→ Candidate</tspan></text>
  <text x="452" y="165" fill="#94a3b8" font-size="10.5">cvId  <tspan fill="#64748b" font-size="9">→ CV (optional)</tspan></text>
  <text x="452" y="180" fill="#94a3b8" font-size="10.5">recruiterId</text>
  <text x="452" y="195" fill="#94a3b8" font-size="10.5">status  <tspan fill="#64748b" font-size="9">Draft|Active|Scored|Sent</tspan></text>
  <text x="452" y="210" fill="#94a3b8" font-size="10.5">overallScore  <tspan fill="#64748b" font-size="9">0–100</tspan></text>
  <text x="452" y="225" fill="#94a3b8" font-size="10.5">createdAt · scoredAt · sentAt</text>

  <!-- questions array divider -->
  <line x1="452" y1="238" x2="628" y2="238" stroke="#1e3a2a" stroke-width="1"/>
  <text x="452" y="254" fill="#34D399" font-size="10" font-weight="700" letter-spacing="0.05em">QUESTIONS  <tspan fill="#64748b" font-weight="400">embedded array</tspan></text>
  <text x="452" y="272" fill="#94a3b8" font-size="10.5">  questionId</text>
  <text x="452" y="287" fill="#94a3b8" font-size="10.5">  category  <tspan fill="#64748b" font-size="9">Technical|Behavioural|Culture</tspan></text>
  <text x="452" y="302" fill="#94a3b8" font-size="10.5">  question  <tspan fill="#64748b" font-size="9">string</tspan></text>
  <text x="452" y="317" fill="#94a3b8" font-size="10.5">  from  <tspan fill="#64748b" font-size="9">Spec | CV</tspan></text>
  <text x="452" y="332" fill="#94a3b8" font-size="10.5">  fromText</text>
  <text x="452" y="347" fill="#94a3b8" font-size="10.5">  answer  <tspan fill="#64748b" font-size="9">typed or transcribed</tspan></text>
  <text x="452" y="362" fill="#94a3b8" font-size="10.5">  answerSource  <tspan fill="#64748b" font-size="9">Typed | Voice</tspan></text>
  <text x="452" y="377" fill="#94a3b8" font-size="10.5">  score  <tspan fill="#64748b" font-size="9">1–10</tspan></text>
  <text x="452" y="392" fill="#94a3b8" font-size="10.5">  aiComment</text>
  <text x="452" y="407" fill="#94a3b8" font-size="10.5">  answeredAt</text>

  <!-- ── RECRUITER (USER) ── -->
  <rect x="440" y="466" width="200" height="42" rx="10" fill="#1a1208" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="540" y="483" fill="#F59E0B" font-size="10" font-weight="800" text-anchor="middle" letter-spacing="0.08em">RECRUITER (USER)</text>
  <text x="540" y="498" fill="#64748b" font-size="10" text-anchor="middle">id · companyId · name · email · role</text>

  <!-- ── ARROWS ── -->
  <line x1="172" y1="110" x2="218" y2="110" stroke="#4F8EF7" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)" opacity="0.6"/>
  <line x1="98" y1="178" x2="98" y2="228" stroke="#A78BFA" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr2)" opacity="0.6"/>
  <line x1="172" y1="295" x2="218" y2="330" stroke="#A78BFA" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr2)" opacity="0.6"/>
  <line x1="380" y1="140" x2="438" y2="140" stroke="#34D399" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)" opacity="0.5"/>
  <line x1="172" y1="270" x2="438" y2="152" stroke="#34D399" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)" opacity="0.4"/>
  <line x1="380" y1="340" x2="438" y2="167" stroke="#34D399" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)" opacity="0.4"/>
  <line x1="540" y1="464" x2="540" y2="450" stroke="#F59E0B" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)" opacity="0.5"/>

  <!-- Legend -->
  <rect x="680" y="68" width="88" height="90" rx="8" fill="#0f1117" stroke="#1e293b" stroke-width="1"/>
  <text x="724" y="84" fill="#64748b" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="0.06em">LEGEND</text>
  <rect x="692" y="92" width="10" height="10" rx="2" fill="#4F8EF7" opacity="0.3" stroke="#4F8EF7" stroke-width="1"/>
  <text x="706" y="101" fill="#94a3b8" font-size="9.5">Job / Company</text>
  <rect x="692" y="108" width="10" height="10" rx="2" fill="#A78BFA" opacity="0.3" stroke="#A78BFA" stroke-width="1"/>
  <text x="706" y="117" fill="#94a3b8" font-size="9.5">People</text>
  <rect x="692" y="124" width="10" height="10" rx="2" fill="#34D399" opacity="0.3" stroke="#34D399" stroke-width="1"/>
  <text x="706" y="133" fill="#94a3b8" font-size="9.5">Pack / Output</text>
  <rect x="692" y="140" width="10" height="10" rx="2" fill="#F59E0B" opacity="0.3" stroke="#F59E0B" stroke-width="1"/>
  <text x="706" y="149" fill="#94a3b8" font-size="9.5">Users</text>

  <!-- Voice note -->
  <rect x="680" y="174" width="88" height="52" rx="8" fill="#0f1117" stroke="#1e293b" stroke-width="1"/>
  <text x="724" y="190" fill="#64748b" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="0.06em">VOICE NOTE</text>
  <text x="724" y="204" fill="#94a3b8" font-size="9" text-anchor="middle">answerSource</text>
  <text x="724" y="216" fill="#94a3b8" font-size="9" text-anchor="middle">tracks typed vs</text>
  <text x="724" y="228" fill="#94a3b8" font-size="9" text-anchor="middle">voice-transcribed</text>
</svg>
