<svg viewBox="0 0 860 580" xmlns="http://www.w3.org/2000/svg" role="img" style="width:100%;height:auto;font-family:-apple-system,'Segoe UI',sans-serif;background:#0d1117;">
  <title>Recruiter Portal — Cosmos DB Data Model (5 Containers)</title>

  <defs>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4F8EF7" opacity="0.7"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#A78BFA" opacity="0.7"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#34D399" opacity="0.7"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#F59E0B" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="580" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="24" y="30" fill="#e2e8f0" font-size="13" font-weight="700" letter-spacing="-0.3">Recruiter Portal — Cosmos DB Model</text>
  <text x="24" y="48" fill="#64748b" font-size="11">5 containers · serverless throughput · partition key: /companyId on each</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- ROW 1: companies (left) + job-specs (right)        -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- Container label: companies -->
  <text x="28" y="76" fill="#4F8EF7" font-size="9" font-weight="800" letter-spacing="0.1em">CONTAINER: companies</text>
  <text x="148" y="76" fill="#1e3a5f" font-size="9">· pk: /id</text>

  <!-- COMPANY box -->
  <rect x="24" y="82" width="164" height="118" rx="10" fill="#0f1a2e" stroke="#4F8EF7" stroke-width="1.5"/>
  <rect x="24" y="82" width="164" height="22" rx="10" fill="#4F8EF7" opacity="0.18"/>
  <rect x="24" y="92" width="164" height="12" fill="#4F8EF7" opacity="0.18"/>
  <text x="106" y="97" fill="#4F8EF7" font-size="10" font-weight="800" text-anchor="middle" letter-spacing="0.08em">COMPANY</text>
  <text x="36" y="118" fill="#94a3b8" font-size="10.5">id  <tspan fill="#64748b" font-size="9">← partition key</tspan></text>
  <text x="36" y="133" fill="#94a3b8" font-size="10.5">name</text>
  <text x="36" y="148" fill="#94a3b8" font-size="10.5">plan  <tspan fill="#64748b" font-size="9">Free | Pro | Enterprise</tspan></text>
  <text x="36" y="163" fill="#94a3b8" font-size="10.5">billingEmail</text>
  <text x="36" y="178" fill="#94a3b8" font-size="10.5">createdAt</text>

  <!-- Container label: job-specs -->
  <text x="218" y="76" fill="#4F8EF7" font-size="9" font-weight="800" letter-spacing="0.1em">CONTAINER: job-specs</text>
  <text x="352" y="76" fill="#1e3a5f" font-size="9">· pk: /companyId</text>

  <!-- JOB SPEC box -->
  <rect x="214" y="82" width="184" height="220" rx="10" fill="#0f1a2e" stroke="#4F8EF7" stroke-width="1.5"/>
  <rect x="214" y="82" width="184" height="22" rx="10" fill="#4F8EF7" opacity="0.18"/>
  <rect x="214" y="92" width="184" height="12" fill="#4F8EF7" opacity="0.18"/>
  <text x="306" y="97" fill="#4F8EF7" font-size="10" font-weight="800" text-anchor="middle" letter-spacing="0.08em">JOB SPEC</text>
  <text x="226" y="118" fill="#94a3b8" font-size="10.5">id</text>
  <text x="226" y="133" fill="#94a3b8" font-size="10.5">companyId  <tspan fill="#64748b" font-size="9">← partition key</tspan></text>
  <text x="226" y="148" fill="#94a3b8" font-size="10.5">title</text>
  <text x="226" y="163" fill="#94a3b8" font-size="10.5">client</text>
  <text x="226" y="178" fill="#94a3b8" font-size="10.5">salary  <tspan fill="#64748b" font-size="9">{ min, max, currency }</tspan></text>
  <text x="226" y="193" fill="#94a3b8" font-size="10.5">type  <tspan fill="#64748b" font-size="9">Permanent | Contract</tspan></text>
  <text x="226" y="208" fill="#94a3b8" font-size="10.5">status  <tspan fill="#64748b" font-size="9">Active | Hold | Filled</tspan></text>
  <text x="226" y="223" fill="#94a3b8" font-size="10.5">requirements  <tspan fill="#64748b" font-size="9">string[]</tspan></text>
  <text x="226" y="238" fill="#94a3b8" font-size="10.5">skills  <tspan fill="#64748b" font-size="9">string[]</tspan></text>
  <text x="226" y="253" fill="#94a3b8" font-size="10.5">blobUrl  <tspan fill="#64748b" font-size="9">raw uploaded doc</tspan></text>
  <text x="226" y="268" fill="#94a3b8" font-size="10.5">recruiterId</text>
  <text x="226" y="283" fill="#94a3b8" font-size="10.5">receivedAt · deadline</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- ROW 2: candidates + cvs                            -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- Container label: candidates -->
  <text x="28" y="224" fill="#A78BFA" font-size="9" font-weight="800" letter-spacing="0.1em">CONTAINER: candidates</text>
  <text x="166" y="224" fill="#2d1e5f" font-size="9">· pk: /companyId</text>

  <!-- CANDIDATE box -->
  <rect x="24" y="230" width="164" height="148" rx="10" fill="#160f2e" stroke="#A78BFA" stroke-width="1.5"/>
  <rect x="24" y="230" width="164" height="22" rx="10" fill="#A78BFA" opacity="0.18"/>
  <rect x="24" y="242" width="164" height="12" fill="#A78BFA" opacity="0.18"/>
  <text x="106" y="246" fill="#A78BFA" font-size="10" font-weight="800" text-anchor="middle" letter-spacing="0.08em">CANDIDATE</text>
  <text x="36" y="268" fill="#94a3b8" font-size="10.5">id</text>
  <text x="36" y="283" fill="#94a3b8" font-size="10.5">companyId  <tspan fill="#64748b" font-size="9">← partition key</tspan></text>
  <text x="36" y="298" fill="#94a3b8" font-size="10.5">name · email · phone</text>
  <text x="36" y="313" fill="#94a3b8" font-size="10.5">currentRole</text>
  <text x="36" y="328" fill="#94a3b8" font-size="10.5">linkedIn</text>
  <text x="36" y="343" fill="#94a3b8" font-size="10.5">tags  <tspan fill="#64748b" font-size="9">string[]</tspan></text>
  <text x="36" y="358" fill="#94a3b8" font-size="10.5">createdAt</text>

  <!-- Container label: cvs -->
  <text x="218" y="322" fill="#A78BFA" font-size="9" font-weight="800" letter-spacing="0.1em">CONTAINER: cvs</text>
  <text x="296" y="322" fill="#2d1e5f" font-size="9">· pk: /companyId</text>

  <!-- CV box -->
  <rect x="214" y="328" width="184" height="148" rx="10" fill="#160f2e" stroke="#A78BFA" stroke-width="1.5"/>
  <rect x="214" y="328" width="184" height="22" rx="10" fill="#A78BFA" opacity="0.18"/>
  <rect x="214" y="340" width="184" height="12" fill="#A78BFA" opacity="0.18"/>
  <text x="306" y="344" fill="#A78BFA" font-size="10" font-weight="800" text-anchor="middle" letter-spacing="0.08em">CV</text>
  <text x="226" y="366" fill="#94a3b8" font-size="10.5">id</text>
  <text x="226" y="381" fill="#94a3b8" font-size="10.5">companyId  <tspan fill="#64748b" font-size="9">← partition key</tspan></text>
  <text x="226" y="396" fill="#94a3b8" font-size="10.5">candidateId</text>
  <text x="226" y="411" fill="#94a3b8" font-size="10.5">fileName · blobUrl</text>
  <text x="226" y="426" fill="#94a3b8" font-size="10.5">extractedData</text>
  <text x="226" y="441" fill="#64748b" font-size="9.5" font-style="italic">  { skills[], highlights[],</text>
  <text x="226" y="454" fill="#64748b" font-size="9.5" font-style="italic">    experience, role }</text>
  <text x="226" y="469" fill="#94a3b8" font-size="10.5">uploadedAt</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- INTERVIEW PACKS — large right column               -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- Container label: interview-packs -->
  <text x="432" y="76" fill="#34D399" font-size="9" font-weight="800" letter-spacing="0.1em">CONTAINER: interview-packs</text>
  <text x="628" y="76" fill="#0d2e1e" font-size="9">· pk: /companyId</text>

  <!-- INTERVIEW PACK box -->
  <rect x="428" y="82" width="220" height="430" rx="10" fill="#0a1f14" stroke="#34D399" stroke-width="1.5"/>
  <rect x="428" y="82" width="220" height="22" rx="10" fill="#34D399" opacity="0.18"/>
  <rect x="428" y="92" width="220" height="12" fill="#34D399" opacity="0.18"/>
  <text x="538" y="97" fill="#34D399" font-size="10" font-weight="800" text-anchor="middle" letter-spacing="0.08em">INTERVIEW PACK</text>
  <text x="440" y="118" fill="#94a3b8" font-size="10.5">id</text>
  <text x="440" y="133" fill="#94a3b8" font-size="10.5">companyId  <tspan fill="#64748b" font-size="9">← partition key</tspan></text>
  <text x="440" y="148" fill="#94a3b8" font-size="10.5">specId  <tspan fill="#64748b" font-size="9">→ job-specs</tspan></text>
  <text x="440" y="163" fill="#94a3b8" font-size="10.5">candidateId  <tspan fill="#64748b" font-size="9">→ candidates</tspan></text>
  <text x="440" y="178" fill="#94a3b8" font-size="10.5">cvId  <tspan fill="#64748b" font-size="9">→ cvs (optional)</tspan></text>
  <text x="440" y="193" fill="#94a3b8" font-size="10.5">recruiterId  <tspan fill="#64748b" font-size="9">→ recruiters</tspan></text>
  <text x="440" y="208" fill="#94a3b8" font-size="10.5">status  <tspan fill="#64748b" font-size="9">Draft|Active|Scored|Sent</tspan></text>
  <text x="440" y="223" fill="#94a3b8" font-size="10.5">overallScore  <tspan fill="#64748b" font-size="9">0–100</tspan></text>
  <text x="440" y="238" fill="#94a3b8" font-size="10.5">createdAt · scoredAt · sentAt</text>

  <!-- questions divider -->
  <line x1="440" y1="252" x2="636" y2="252" stroke="#1e3a2a" stroke-width="1"/>
  <text x="440" y="268" fill="#34D399" font-size="10" font-weight="700" letter-spacing="0.04em">QUESTIONS  <tspan fill="#64748b" font-weight="400" font-size="9">embedded []</tspan></text>
  <text x="440" y="286" fill="#94a3b8" font-size="10.5">  questionId</text>
  <text x="440" y="301" fill="#94a3b8" font-size="10.5">  category  <tspan fill="#64748b" font-size="9">Technical | Behavioural | Culture</tspan></text>
  <text x="440" y="316" fill="#94a3b8" font-size="10.5">  question</text>
  <text x="440" y="331" fill="#94a3b8" font-size="10.5">  from  <tspan fill="#64748b" font-size="9">Spec | CV</tspan></text>
  <text x="440" y="346" fill="#94a3b8" font-size="10.5">  fromText</text>
  <text x="440" y="361" fill="#94a3b8" font-size="10.5">  answer  <tspan fill="#64748b" font-size="9">string</tspan></text>
  <text x="440" y="376" fill="#94a3b8" font-size="10.5">  answerSource  <tspan fill="#64748b" font-size="9">Typed | Voice</tspan></text>
  <text x="440" y="391" fill="#94a3b8" font-size="10.5">  score  <tspan fill="#64748b" font-size="9">1–10</tspan></text>
  <text x="440" y="406" fill="#94a3b8" font-size="10.5">  aiComment</text>
  <text x="440" y="421" fill="#94a3b8" font-size="10.5">  answeredAt</text>

  <!-- ── RECRUITER (USER) ── -->
  <text x="432" y="530" fill="#F59E0B" font-size="9" font-weight="800" letter-spacing="0.1em">CONTAINER: recruiters</text>
  <text x="562" y="530" fill="#2e1e08" font-size="9">· pk: /companyId</text>
  <rect x="428" y="536" width="220" height="36" rx="10" fill="#1a1208" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="538" y="549" fill="#F59E0B" font-size="10" font-weight="800" text-anchor="middle" letter-spacing="0.07em">RECRUITER</text>
  <text x="538" y="563" fill="#64748b" font-size="9.5" text-anchor="middle">id · companyId · name · email · role</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- THROUGHPUT NOTE                                     -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="672" y="82" width="164" height="72" rx="8" fill="#0f1117" stroke="#1e293b" stroke-width="1"/>
  <text x="754" y="98" fill="#64748b" font-size="9" font-weight="800" text-anchor="middle" letter-spacing="0.06em">THROUGHPUT</text>
  <text x="684" y="114" fill="#34D399" font-size="10" font-weight="700">Serverless</text>
  <text x="684" y="128" fill="#94a3b8" font-size="9.5">Pay per request</text>
  <text x="684" y="141" fill="#94a3b8" font-size="9.5">No minimum cost</text>
  <text x="684" y="154" fill="#64748b" font-size="9">Switch to provisioned</text>

  <!-- LEGEND -->
  <rect x="672" y="168" width="164" height="100" rx="8" fill="#0f1117" stroke="#1e293b" stroke-width="1"/>
  <text x="754" y="184" fill="#64748b" font-size="9" font-weight="800" text-anchor="middle" letter-spacing="0.06em">LEGEND</text>
  <rect x="684" y="192" width="10" height="10" rx="2" fill="#4F8EF7" opacity="0.3" stroke="#4F8EF7" stroke-width="1"/>
  <text x="698" y="201" fill="#94a3b8" font-size="9.5">Company / Jobs</text>
  <rect x="684" y="208" width="10" height="10" rx="2" fill="#A78BFA" opacity="0.3" stroke="#A78BFA" stroke-width="1"/>
  <text x="698" y="217" fill="#94a3b8" font-size="9.5">People / CVs</text>
  <rect x="684" y="224" width="10" height="10" rx="2" fill="#34D399" opacity="0.3" stroke="#34D399" stroke-width="1"/>
  <text x="698" y="233" fill="#94a3b8" font-size="9.5">Pack / Output</text>
  <rect x="684" y="240" width="10" height="10" rx="2" fill="#F59E0B" opacity="0.3" stroke="#F59E0B" stroke-width="1"/>
  <text x="698" y="249" fill="#94a3b8" font-size="9.5">Users</text>
  <line x1="684" y1="258" x2="698" y2="258" stroke="#4F8EF7" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="702" y="262" fill="#64748b" font-size="9">cross-container ref</text>

  <!-- ── CROSS CONTAINER ARROWS ── -->
  <!-- Company → JobSpec (companyId) -->
  <line x1="188" y1="130" x2="212" y2="130" stroke="#4F8EF7" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-blue)" opacity="0.6"/>
  <!-- Company → Candidate -->
  <line x1="106" y1="200" x2="106" y2="228" stroke="#A78BFA" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-purple)" opacity="0.6"/>
  <!-- Candidate → CV -->
  <line x1="188" y1="304" x2="212" y2="368" stroke="#A78BFA" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-purple)" opacity="0.6"/>
  <!-- JobSpec → Pack (specId) -->
  <line x1="398" y1="148" x2="426" y2="148" stroke="#34D399" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-green)" opacity="0.6"/>
  <!-- Candidate → Pack (candidateId) -->
  <line x1="188" y1="270" x2="426" y2="163" stroke="#34D399" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-green)" opacity="0.5"/>
  <!-- CV → Pack (cvId) -->
  <line x1="398" y1="390" x2="426" y2="178" stroke="#34D399" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-green)" opacity="0.4"/>
  <!-- Recruiter → Pack (recruiterId) -->
  <line x1="538" y1="534" x2="538" y2="514" stroke="#F59E0B" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-amber)" opacity="0.6"/>
</svg>
